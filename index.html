<!DOCTYPE html>
<html lang="en">
<head>

<title>Chore Tracker</title>

<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; }
  #app { width: 100%; max-width: 440px; min-height: 100vh; }
  #burst { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: #238636; color: #fff; font-size: 20px; font-weight: 700; padding: 10px 22px; border-radius: 30px; z-index: 999; pointer-events: none; display: none; white-space: nowrap; }

  /* HOME */
  .home { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
  .home-balance { font-size: 56px; font-weight: 700; color: #3fb950; letter-spacing: -2px; margin-bottom: 4px; }
  .home-label { font-size: 13px; color: #8b949e; margin-bottom: 32px; }
  .home h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .home p { font-size: 14px; color: #8b949e; margin-bottom: 28px; line-height: 1.5; }
  .home-stats { display: flex; gap: 10px; margin-bottom: 24px; width: 100%; }
  .home-stat { flex: 1; background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 8px; text-align: center; }
  .home-stat-val { font-size: 20px; font-weight: 700; }
  .home-stat-label { font-size: 11px; color: #8b949e; margin-top: 3px; }
  .start-btn { width: 100%; padding: 15px; background: #238636; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
  .settings-link { background: transparent; border: 1px solid #21262d; border-radius: 8px; padding: 12px; width: 100%; color: #8b949e; font-size: 14px; cursor: pointer; }

  /* WALLET BAR */
  .wallet-bar { padding: 16px 18px 12px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: flex-end; }
  .wallet-amount { font-size: 30px; font-weight: 700; color: #3fb950; }
  .wallet-label { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .wallet-right { text-align: right; }
  .streak-badge { font-size: 13px; color: #8b949e; }
  .total-earned { font-size: 11px; color: #8b949e; margin-top: 3px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid #21262d; }
  .tab { flex: 1; padding: 11px 6px; background: transparent; border: none; color: #8b949e; font-size: 13px; cursor: pointer; font-weight: 500; border-bottom: 2px solid transparent; }
  .tab.on { color: #e6edf3; border-bottom: 2px solid #3fb950; }
  .home-btn { padding: 8px 12px; background: transparent; border: 1px solid #21262d; border-radius: 6px; color: #8b949e; font-size: 13px; cursor: pointer; margin: 6px 8px; }

  /* BODY */
  .body { padding: 14px 14px 100px; }

  /* GROUPS */
  .group-block { margin-bottom: 22px; }
  .group-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .group-title { font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: #8b949e; }
  .group-count { font-size: 12px; color: #8b949e; }
  .group-count.maxed { color: #3fb950; font-weight: 600; }
  .prog-bar { height: 3px; background: #21262d; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; background: #3fb950; }
  .prog-fill.blue { background: #58a6ff; }
  .maxed-bar { text-align: center; padding: 10px; background: rgba(63,185,80,0.05); border: 1px solid rgba(63,185,80,0.15); border-radius: 8px; font-size: 13px; color: #3fb950; font-weight: 500; margin-bottom: 6px; }
  .maxed-bar.blue { background: rgba(88,166,255,0.05); border-color: rgba(88,166,255,0.15); color: #58a6ff; }

  /* ROOM SECTIONS */
  .room-section { margin-bottom: 12px; }
  .room-label { font-size: 12px; font-weight: 600; color: #58a6ff; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 1px; display: flex; align-items: center; gap: 8px; }
  .room-done-pill { font-size: 10px; color: #3fb950; background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.25); border-radius: 10px; padding: 1px 7px; font-weight: 600; }

  /* CARDS */
  .card-wrap { margin-bottom: 7px; animation: slideUp 0.22s ease both; }
  .card { width: 100%; display: flex; align-items: center; gap: 11px; background: #161b22; border: 1px solid #21262d; border-radius: 10px 10px 0 0; padding: 12px 13px; cursor: pointer; text-align: left; color: #e6edf3; }
  .card.solo { border-radius: 10px; }
  .card.done-card { border-radius: 10px; opacity: 0.45; cursor: default; }
  .card.locked { opacity: 0.3; cursor: default; border-radius: 10px; }
  .card-emoji { font-size: 18px; flex-shrink: 0; }
  .card-mid { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; line-height: 1.2; }
  .card-title.done { text-decoration: line-through; color: #8b949e; font-weight: 400; }
  .card-desc { font-size: 12px; color: #8b949e; line-height: 1.4; }
  .card-val { flex-shrink: 0; font-size: 14px; font-weight: 700; color: #3fb950; }
  .card-val.blue { color: #58a6ff; }
  .card-val.gold { color: #e3b341; }
  .card-check { flex-shrink: 0; font-size: 16px; color: #3fb950; }
  .swap-btn { display: block; width: 100%; padding: 5px; background: transparent; border: 1px dashed #21262d; border-top: none; border-radius: 0 0 8px 8px; color: #6e7681; font-size: 11px; cursor: pointer; }
  .bonus-tag { font-size: 10px; font-weight: 600; color: #e3b341; background: rgba(227,179,65,0.1); border: 1px solid rgba(227,179,65,0.25); border-radius: 4px; padding: 1px 5px; margin-left: 5px; vertical-align: middle; }
  .add-task-btn { width: 100%; padding: 11px; background: transparent; border: 1px dashed #30363d; border-radius: 10px; color: #8b949e; font-size: 13px; cursor: pointer; margin-top: 8px; }
  .all-done-banner { text-align: center; padding: 22px 16px; border: 1px solid #238636; border-radius: 10px; background: rgba(35,134,54,0.06); margin-top: 8px; }
  .all-done-banner .icon { font-size: 34px; margin-bottom: 8px; }
  .all-done-banner p { font-size: 15px; color: #3fb950; font-weight: 600; }

  /* SPEND */
  .msg-bar { border-radius: 8px; padding: 10px 14px; text-align: center; font-size: 13px; font-weight: 500; margin-bottom: 14px; color: #fff; }
  .spend-balance-big { font-size: 52px; font-weight: 700; color: #3fb950; letter-spacing: -2px; text-align: center; margin-bottom: 4px; }
  .spend-balance-label { font-size: 13px; color: #8b949e; text-align: center; margin-bottom: 36px; }
  .spend-input-display { font-size: 40px; font-weight: 700; color: #e6edf3; letter-spacing: -1px; text-align: center; min-height: 54px; margin-bottom: 20px; }
  .spend-input-display.has-val { color: #da3633; }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .key-btn { padding: 18px 8px; background: #161b22; border: 1px solid #21262d; border-radius: 10px; color: #e6edf3; font-size: 20px; font-weight: 500; cursor: pointer; text-align: center; }
  .key-btn:active { background: #21262d; }
  .key-btn.del { color: #8b949e; font-size: 16px; }
  .deduct-btn { width: 100%; padding: 15px; background: #da3633; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
  .deduct-btn:disabled { opacity: 0.3; cursor: default; background: #30363d; }

  /* SETTINGS */
  .settings-page { padding: 20px 16px 80px; }
  .settings-page h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .settings-section { margin-bottom: 28px; }
  .settings-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #8b949e; margin-bottom: 12px; }
  .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid #21262d; }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 14px; color: #e6edf3; }
  .settings-row-sub { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper-btn { width: 32px; height: 32px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .stepper-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #30363d; border-radius: 24px; cursor: pointer; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: #238636; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
  .currency-input { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px; color: #e6edf3; font-size: 15px; width: 60px; text-align: center; }
  .save-settings-btn { width: 100%; padding: 14px; background: #238636; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .settings-note { font-size: 12px; color: #8b949e; text-align: center; margin-top: 10px; line-height: 1.5; }




  /* TASK MENU */
  .card-menu-btn {
    background: transparent; border: none;
    color: #6e7681; font-size: 18px; cursor: pointer;
    padding: 0 4px; flex-shrink: 0; line-height: 1;
    letter-spacing: 1px;
  }
  .task-menu-overlay {
    position: fixed; inset: 0; z-index: 490;
  }
  .task-menu {
    position: fixed; right: 16px; top: 50%;
    background: #1c2128; border: 1px solid #30363d;
    border-radius: 10px; z-index: 500;
    min-width: 200px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .task-menu-header {
    font-size: 11px; color: #8b949e; padding: 10px 14px 6px;
    border-bottom: 1px solid #21262d; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .task-menu-item {
    width: 100%; padding: 11px 14px; background: transparent;
    border: none; color: #e6edf3; font-size: 14px;
    cursor: pointer; text-align: left; display: block;
    border-bottom: 1px solid #21262d;
  }
  .task-menu-item:last-child { border-bottom: none; }
  .task-menu-item:active { background: #21262d; }
  .task-menu-item .menu-sub { font-size: 11px; color: #8b949e; margin-top: 1px; }
  .task-menu-item.danger { color: #f85149; }
  .snooze-sub { padding: 4px 0 4px 14px; border-bottom: 1px solid #21262d; }
  .snooze-opts { display: flex; gap: 6px; padding: 8px 14px; flex-wrap: wrap; }
  .snooze-opt {
    padding: 5px 10px; background: #161b22;
    border: 1px solid #30363d; border-radius: 6px;
    color: #e6edf3; font-size: 12px; cursor: pointer;
  }
  .snooze-opt:active { background: #21262d; }
  .card.snoozed { opacity: 0.35; }
  .card.snoozed .card-title { text-decoration: line-through; color: #8b949e; }


  .quiz-card { background: var(--color-background-primary,#161b22); border: 1px solid #21262d; border-radius: 12px; padding: 20px; margin-bottom: 0; }
  .quiz-q { font-size: 17px; font-weight: 500; color: #e6edf3; margin-bottom: 20px; line-height: 1.4; }
  .quiz-btns { display: flex; gap: 10px; }
  .quiz-btn { flex: 1; padding: 13px 8px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; font-size: 14px; cursor: pointer; font-weight: 500; }
  .quiz-btn.keep { border-color: #3fb950; color: #3fb950; }
  .quiz-btn.discard { border-color: #f85149; color: #f85149; }
  .quiz-btn:active { opacity: 0.7; }
  .quiz-result { text-align: center; padding: 32px 20px; }
  .quiz-result .icon { font-size: 48px; margin-bottom: 12px; }
  .quiz-result .verdict { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
  .quiz-result .reason { font-size: 14px; color: #8b949e; margin-bottom: 24px; line-height: 1.5; }
  .quiz-progress { display: flex; gap: 4px; margin-bottom: 20px; }
  .quiz-dot { height: 3px; flex: 1; border-radius: 2px; background: #21262d; }
  .quiz-dot.done { background: #3fb950; }
  .quiz-dot.discard-dot { background: #f85149; }
  .quiz-prompt { font-size: 13px; color: #8b949e; margin-bottom: 20px; text-align: center; }
  /* BONUS PICKER */
  .bonus-picker { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 12px; margin-top: 8px; }
  .bonus-picker input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #e6edf3; font-size: 13px; margin-bottom: 8px; }
  .bonus-picker-list { max-height: 220px; overflow-y: auto; }
  .bonus-picker-item { width: 100%; padding: 9px 10px; background: transparent; border: none; border-bottom: 1px solid #21262d; color: #e6edf3; font-size: 13px; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; }
  .bonus-picker-item:last-child { border-bottom: none; }
  .bonus-picker-item:active { background: #21262d; }
  .bonus-picker-item .picker-val { color: #3fb950; font-size: 12px; flex-shrink: 0; margin-left: 8px; }
  .bonus-picker-row { display: flex; gap: 8px; margin-top: 8px; }
  /* HISTORY */
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history-table th { text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #8b949e; padding: 8px 6px; border-bottom: 1px solid #21262d; }
  .history-table th.num { text-align: center; }
  .history-table td { padding: 9px 6px; border-bottom: 1px solid #161b22; vertical-align: top; color: #e6edf3; }
  .history-table td.num { text-align: center; color: #8b949e; }
  .history-table td.num.hi { color: #3fb950; font-weight: 600; }
  .history-table td.num.lo { color: #da3633; }
  .history-table tr:last-child td { border-bottom: none; }
  .history-sort { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .sort-btn { padding: 5px 10px; background: #161b22; border: 1px solid #21262d; border-radius: 6px; color: #8b949e; font-size: 11px; cursor: pointer; }
  .sort-btn.on { border-color: #3fb950; color: #3fb950; }
  .history-zero { text-align: center; padding: 40px 20px; color: #8b949e; font-size: 13px; }
  /* TIMER */
  .timer-wrap { display: flex; flex-direction: column; align-items: center; padding: 40px 24px 80px; }
  .timer-mode { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #8b949e; margin-bottom: 28px; }
  .timer-mode.work { color: #3fb950; }
  .timer-mode.brk  { color: #58a6ff; }
  .timer-mode.long { color: #e3b341; }
  .timer-ring { position: relative; width: 220px; height: 220px; margin-bottom: 32px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring-bg { fill: none; stroke: #21262d; stroke-width: 8; }
  .timer-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-ring-fill.work { stroke: #3fb950; }
  .timer-ring-fill.brk  { stroke: #58a6ff; }
  .timer-ring-fill.long { stroke: #e3b341; }
  .timer-digits { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-time { font-size: 48px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
  .timer-round { font-size: 12px; color: #8b949e; margin-top: 6px; }
  .timer-controls { display: flex; gap: 12px; margin-bottom: 28px; }
  .timer-btn { padding: 13px 28px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .timer-btn.primary { background: #238636; color: #fff; }
  .timer-btn.primary.pause { background: #9e6a03; }
  .timer-btn.secondary { background: #161b22; border: 1px solid #30363d; color: #8b949e; }
  .timer-dots { display: flex; gap: 8px; }
  .timer-dot { width: 10px; height: 10px; border-radius: 50%; background: #21262d; }
  .timer-dot.done { background: #3fb950; }
  @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes burstUp { 0% { opacity:1; transform:translateX(-50%) translateY(0); } 70% { opacity:1; } 100% { opacity:0; transform:translateX(-50%) translateY(-50px); } }
</style>

<body>
<div id="app"></div>
<div id="burst"></div>
<script>

// ── SLOTS ─────────────────────────────────────────────────────────────────────
// Base slots — scaled by messiness setting at runtime
const SL_BASE = {
  small: [3,4,5,6,7], medium: [8,9,10,11,12],
  color: ["white","black","colorful","striped","beige","grey","blue","red","yellow","green","purple","teal"],
  cat: ["books","mugs","bottles","pens","bags","chargers","clothes","cushions","shoes","jars"],
  fate: ["donate","throw away","return to its rightful room","deal with once and for all"],
  months: ["3 months","6 months","a year","way too long"],
  pairs: [3,4,5,6,7],
};
const pick = a => a[Math.floor(Math.random()*a.length)];

function getSL() {
  const mess = ST.settings?.messiness || 'normal';
  const base = JSON.parse(JSON.stringify(SL_BASE));
  if(mess === 'clean') {
    base.small = base.small.map(n=>Math.max(1,Math.round(n*0.5)));
    base.medium = base.medium.map(n=>Math.max(2,Math.round(n*0.5)));
    base.pairs = base.pairs.map(n=>Math.max(1,Math.round(n*0.5)));
  } else if(mess === 'messy') {
    base.small = base.small.map(n=>Math.round(n*1.25));
    base.medium = base.medium.map(n=>Math.round(n*1.25));
    base.pairs = base.pairs.map(n=>Math.round(n*1.25));
  }
  return base;
}
const sl = k => pick(getSL()[k]);

// ── TASK POOLS ────────────────────────────────────────────────────────────────

const GENERAL_POOL = [
  ()=>({title:"Wrong Room",       desc:`Find ${sl("medium")} things that have wandered to the wrong room and send them home.`,val:50,emoji:"🗺️"}),
  ()=>({title:"Color Hunt",       desc:`Round up ${sl("medium")} ${sl("color")} objects from anywhere in the house. Put them away or throw them out.`,val:50,emoji:"🎯"}),
  ()=>({title:"Floor Pickup",     desc:`Pick ${sl("medium")} things off the floor. The floor is not storage.`,val:50,emoji:"⬆️"}),
  ()=>({title:"Purge",            desc:`Find ${sl("small")} things you haven't touched in ${sl("months")} and ${sl("fate")}.`,val:75,emoji:"🗑️"}),
  ()=>({title:"Flat Surfaces",    desc:`Clear ${sl("medium")} things off flat surfaces.`,val:75,emoji:"🪴"}),
  ()=>({title:"Handles & Switches",desc:"Wipe every door handle and light switch in the house. You know how many hands touch those.",val:150,emoji:"🚪"}),
  ()=>({title:"Trash Cans",       desc:"Empty every trash can, and yes, you have to put new bags in.",val:75,emoji:"🗑️"}),
  ()=>({title:"Windows",          desc:`Clean ${sl("small")} windows from the inside.`,val:100,emoji:"🪟"}),
  ()=>({title:"Bag Audit",        desc:"Check every bag, purse, and backpack. Remove receipts, wrappers, and whatever that gross thing is.",val:100,emoji:"👜"}),
  ()=>({title:"Recycling",        desc:"Take out the recycling. Shred anything that could be used to steal your identity.",val:50,emoji:"♻️"}),
  ()=>({title:"Forgotten Spot",   desc:"Find one surface you have never once cleaned. Today is the day.",val:100,emoji:"🧐"}),
  ()=>({title:"Duplicates",       desc:`Find ${sl("small")} things you own multiples of for no reason. Pick a winner and throw the rest away.`,val:100,emoji:"✂️"}),
  ()=>({title:"Mug Roundup",      desc:"Hunt down every mug that isn't in the kitchen. Escort them back.",val:50,emoji:"☕"}),
  ()=>({title:"Baseboards",       desc:"Wipe down one wall's baseboards. Run a finger first if you're brave.",val:75,emoji:"👆"}),
  ()=>({title:"High Shelf",       desc:"Clean the highest shelf you can reach. Something's been up there since you moved in.",val:100,emoji:"🧹"}),
  ()=>({title:"Doormat",          desc:"Take the doormat outside and beat the life out of it.",val:50,emoji:"🏠"}),
  ()=>({title:"Hallway",          desc:"Sweep or vacuum the hallway.",val:100,emoji:"🚪"}),
  ()=>({title:"First Impression", desc:"Stand at your front door. Look in like a stranger would. Fix the one thing that jumps out.",val:75,emoji:"👋"}),

const todayStr    = () => new Date().toISOString().split("T")[0];
const daysBetween = (a,b) => Math.floor((new Date(b)-new Date(a))/86400000);
const defaultData = () => ({balance:0,totalEarned:0,totalCompleted:0,streak:0,maxStreak:0,lastActiveDay:null,allDoneBonusPaidToday:null,choreHistory:{},choreStats:{}});

// Scale a task's base value by 10% per day since last completed (max 3x)
function scaledVal(baseVal, title) {
  const history = ST.data?.choreHistory || {};
  const lastDone = history[title];

  // Convert base val (effort units) to minutes, then to dollars at hourly wage
  // effort scale: 25=1min, 50=2min, 75=3min, 100=5min, 150=8min, 200=12min, 250=18min, 300=25min
  const effortToMins = v => {
    if(v <= 25)  return 1;
    if(v <= 50)  return 2;
    if(v <= 75)  return 3;
    if(v <= 100) return 5;
    if(v <= 125) return 6;
    if(v <= 150) return 8;
    if(v <= 200) return 12;
    if(v <= 250) return 18;
    return 25;
  };
  const wage = ST.settings?.hourlyWage || 25;
  const mins = effortToMins(baseVal);
  const base = Math.round((wage / 60) * mins * 100); // in cents

  if(!lastDone) return {val: base, days: 0};
  const days = daysBetween(lastDone, todayStr());
  const multiplier = Math.min(3, 1 + (days * 0.1));
  return {val: Math.round(base * multiplier), days};
}

function fmt(cents) {
  const sym = ST.settings?.currency || "$";
  return `${sym}${(cents/100).toFixed(2)}`;
}

function pickUnique(pool, count, usedTitles=[]) {
  const hidden = ST.data?.hiddenTasks || [];
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  const out = [];
  for(const fn of shuffled) {
    if(out.length >= count) break;
    const t = typeof fn === 'function' ? fn() : fn;
    if(!usedTitles.includes(t.title) && !hidden.includes(t.title)) {
      const {val, days} = scaledVal(t.val, t.title);
      out.push({...t, baseVal: t.val, val, daysSince: days, id:`t${Date.now()}_${Math.random().toString(36).slice(2)}`});
    }
  }
  return out;
}

function recordShown(tasks) {
  if(!ST.data) return;
  const stats = {...(ST.data.choreStats||{})};
  for(const t of tasks) {
    const key = t.title;
    stats[key] = stats[key] || {timesShown:0,timesCompleted:0,timesSwapped:0,lastCompleted:null};
    stats[key].timesShown++;
  }
  ST.data.choreStats = stats;
  saveData(ST.data);
}

function buildRoomPool(pool, roomName) {
  return pool.map(fn => () => fn(roomName));
}

// Adjust floor task descriptions based on floor type
function floorDesc(room, type) {
  if(!type || type === 'carpet') return `Vacuum the ${room} floor. Move things.`;
  if(type === 'hardwood')        return `Sweep and mop the ${room} floor. Move things.`;
  if(type === 'tile')            return `Sweep and mop the ${room} floor. Get the grout lines.`;
  if(type === 'concrete')        return `Sweep the ${room} floor. Mop if it needs it.`;
  return `Clean the ${room} floor.`;
}

function buildDailyTasks(settings) {
  const {fullBaths, halfBaths, bedrooms, stairs, activeGroups, floorTypes} = settings;
  const hasLaundryRoom = activeGroups.laundry;
  const snoozedTitles = Object.entries(ST.data?.snoozed||{})
    .filter(([,d])=>d > todayStr()).map(([title])=>title);
  const hiddenTasks = ST.data?.hiddenTasks || [];
  const filteredGeneral = GENERAL_POOL.filter(fn => {
    const t = fn();
    if(hasLaundryRoom && t.laundryOnly) return false;
    if(snoozedTitles.includes(t.title)) return false;
    if(hiddenTasks.includes(t.title)) return false;
    return true;
  });
  const general = pickUnique(filteredGeneral, GENERAL_TOTAL).map(t=>({...t,group:"general"}));
  const rooms = {};

  if(activeGroups.kitchen) {
    rooms["Kitchen"] = pickUnique(KITCHEN_POOL, ROOM_TASKS).map(t=>({...t,group:"room",room:"Kitchen"}));
  }
  if(activeGroups.bathrooms) {
    const allBathTasks = [];
    const fb = settings.fullBaths || 1;
    const hb = settings.halfBaths || 0;
    for(let i=1; i<=fb; i++) {
      const name = (fb+hb)===1 ? "Full Bath" : `Full Bath #${i}`;
      FULL_BATH_POOL(name).forEach(t => allBathTasks.push(()=>t));
    }
    for(let i=1; i<=hb; i++) {
      const name = (fb+hb)===1 ? "Half Bath" : `Half Bath #${i}`;
      HALF_BATH_POOL(name).forEach(t => allBathTasks.push(()=>t));
    }
    rooms["Bathrooms"] = pickUnique(allBathTasks, ROOM_TASKS).map(t=>({...t,group:"room",room:"Bathrooms"}));
  }
  if(activeGroups.bedrooms) {
    const ft = floorTypes?.bedrooms || 'carpet';
    const allBedTasks = [];
    for(let i=1; i<=bedrooms; i++) {
      const name = bedrooms===1 ? "Bedroom" : `Bedroom #${i}`;
      const pool = BEDROOM_POOL.map(fn => r => {
        const t = fn(r);
        if(t.title.includes('Vacuum')) return {...t, desc: floorDesc(r, ft)};
        return t;
      });
      buildRoomPool(pool, name).forEach(fn => allBedTasks.push(fn));
    }
    rooms["Bedrooms"] = pickUnique(allBedTasks, ROOM_TASKS).map(t=>({...t,group:"room",room:"Bedrooms"}));
  }
  if(activeGroups.office) {
    const ft = floorTypes?.office || 'hardwood';
    const pool = OFFICE_POOL.map(fn => () => {
      const t = fn();
      if(t.title === 'Vacuum Floor') return {...t, title: ft==='carpet'?'Vacuum Floor':'Sweep & Mop Floor', desc: floorDesc('office', ft)};
      return t;
    });
    rooms["Home Office"] = pickUnique(pool, ROOM_TASKS).map(t=>({...t,group:"room",room:"Home Office"}));
  }
  if(activeGroups.gameroom) {
    const ft = floorTypes?.gameroom || 'carpet';
    const pool = GAMEROOM_POOL.map(fn => () => {
      const t = fn();
      if(t.title === 'Floor') return {...t, title: ft==='carpet'?'Vacuum Floor':'Sweep Floor', desc: floorDesc('game room', ft)};
      return t;
    });
    rooms["Game Room"] = pickUnique(pool, ROOM_TASKS).map(t=>({...t,group:"room",room:"Game Room"}));
  }
  if(activeGroups.den) {
    const ft = floorTypes?.den || 'carpet';
    const pool = DEN_POOL.map(fn => () => {
      const t = fn();
      if(t.title === 'Floor') return {...t, title: ft==='carpet'?'Vacuum Floor':'Sweep Floor', desc: floorDesc('family room', ft)};
      return t;
    });
    rooms["Den / Family Room"] = pickUnique(pool, ROOM_TASKS).map(t=>({...t,group:"room",room:"Den / Family Room"}));
  }
  if(activeGroups.basement) {
    const ft = floorTypes?.basement || 'concrete';
    const pool = BASEMENT_POOL.map(fn => () => {
      const t = fn();
      if(t.title === 'Sweep Floor') return {...t, desc: floorDesc('basement', ft)};
      return t;
    });
    rooms["Basement"] = pickUnique(pool, ROOM_TASKS).map(t=>({...t,group:"room",room:"Basement"}));
  }
  if(activeGroups.laundry) {
    rooms["Laundry Room"] = pickUnique(LAUNDRY_POOL, ROOM_TASKS).map(t=>({...t,group:"room",room:"Laundry Room"}));
  }
  if(activeGroups.stairs) {
    const n = stairs || 1;
    const allStairTasks = [];
    for(let i=1; i<=n; i++) {
      const name = n===1 ? "Stairs" : `Stairs #${i}`;
      buildRoomPool(STAIRS_POOL, name).forEach(fn => allStairTasks.push(fn));
    }
    rooms["Stairs"] = pickUnique(allStairTasks, ROOM_TASKS).map(t=>({...t,group:"room",room:"Stairs"}));
  }

  return {general, rooms};
}

function getRoomOrder(settings) {
  const {activeGroups} = settings;
  const order = [];
  if(activeGroups.kitchen)   order.push("Kitchen");
  if(activeGroups.bathrooms) order.push("Bathrooms");
  if(activeGroups.bedrooms)  order.push("Bedrooms");
  if(activeGroups.office)    order.push("Home Office");
  if(activeGroups.gameroom)  order.push("Game Room");
  if(activeGroups.den)       order.push("Den / Family Room");
  if(activeGroups.basement)  order.push("Basement");
  if(activeGroups.laundry)   order.push("Laundry Room");
  if(activeGroups.stairs)    order.push("Stairs");
  return order;
}

function renderMain(app) {
  const {data, daily, completed, tab, settings} = ST;
  const roomOrder = getRoomOrder(settings);

  const generalTasks = daily?.general || [];
  const generalDone  = generalTasks.filter(t=>completed[t.id]).length;
  const generalMaxed = generalDone >= GENERAL_MAX;

  let roomDoneTotal = 0;
  for(const r of roomOrder) roomDoneTotal += (daily?.rooms[r]||[]).filter(t=>completed[t.id]).length;
  const roomMaxed = roomDoneTotal >= ROOM_MAX;
  const allMaxed  = generalMaxed && roomMaxed;
  const bal       = data?.balance||0;
  const bonusTasks = daily?.bonus || [];
  const bonusDone  = bonusTasks.filter(t=>completed[t.id]).length;
  const swapped    = daily?.swapped || {};

  const gPct = Math.min(100,Math.round((generalDone/GENERAL_MAX)*100));
  const rPct = Math.min(100,Math.round((roomDoneTotal/ROOM_MAX)*100));

  const choreHTML = `
    <div class="group-block">
      <div class="group-header">
        <span class="group-title">General</span>
        <span class="group-count ${generalDone>=GENERAL_MAX?'maxed':''}">${generalDone>=GENERAL_MAX?`✓ ${generalDone} done`:`${generalDone}/${GENERAL_MAX}`}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${gPct}%"></div></div>
      ${generalDone>=GENERAL_MAX?`<div class="maxed-bar">🔥 Streak earned — keep going for more</div>`:''}
      ${generalTasks.map(t=>renderCard(t,completed,false)).join("")}
    </div>

    <div class="group-block">
      <div class="group-header">
        <span class="group-title">By Room</span>
        <span class="group-count ${roomDoneTotal>=ROOM_MAX?'maxed':''}">${roomDoneTotal>=ROOM_MAX?`✓ ${roomDoneTotal} done`:`${roomDoneTotal}/${ROOM_MAX}`}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill blue" style="width:${rPct}%"></div></div>
      ${roomDoneTotal>=ROOM_MAX?`<div class="maxed-bar blue">🔥 Streak earned — keep going for more</div>`:''}
      ${roomOrder.map(room => {
        const tasks   = daily?.rooms[room]||[];
        const rdone   = tasks.filter(t=>completed[t.id]).length;
        const locked  = false;
        return `<div class="room-section">
          <div class="room-label">${room}${rdone===tasks.length?'<span class="room-done-pill">done</span>':''}</div>
          ${tasks.map(t=>renderCard(t,completed,locked&&!completed[t.id],true)).join("")}
        </div>`;
      }).join("")}
    </div>

    ${bonusTasks.length ? `
    <div class="group-block">
      <div class="group-header"><span class="group-title">Bonus</span><span class="group-count">${bonusDone}/${bonusTasks.length}</span></div>
      ${bonusTasks.map(t=>renderCard(t,completed,false,false,true)).join("")}
    </div>` : ''}

    ${ST.showBonusPicker ? `
      <div class="bonus-picker">
        <input id="bonus-search" placeholder="Search tasks..." oninput="render()" autofocus>
        <div class="bonus-picker-list">
          ${(()=>{
            const usedTitles = getAllTasks().map(t=>t.title);
            const hidden = ST.data?.hiddenTasks||[];
            const snoozed = Object.entries(ST.data?.snoozed||{}).filter(([,d])=>d>todayStr()).map(([t])=>t);
            const query = document.getElementById('bonus-search')?.value?.toLowerCase()||'';
            const all = getAllBonusPool();
            return all
              .filter(fn=>{ const t=fn(); return !usedTitles.includes(t.title)&&!hidden.includes(t.title)&&!snoozed.includes(t.title)&&!isSlotted(t.title); })
              .map(fn=>fn())
              .filter((t,i,arr)=>arr.findIndex(x=>x.title===t.title)===i) // dedupe
              .filter(t=>!query||t.title.toLowerCase().includes(query))
              .slice(0,40)
              .map(t=>`<button class="bonus-picker-item" onclick="addBonusTaskPicked('${t.title.replace(/'/g,"\'")}')">

              </button>`)
              .join('') || '<div style="padding:12px;color:#8b949e;font-size:13px">No tasks found</div>';
          })()}
        </div>
        <div class="bonus-picker-row">
          <button class="add-task-btn" style="flex:1;margin:0" onclick="addBonusTask()">↺ Random</button>
          <button class="add-task-btn" style="flex:1;margin:0;color:#6e7681" onclick="ST.showBonusPicker=false;render()">Cancel</button>

      </div>

    ${allMaxed?`<div class="all-done-banner" style="margin-top:16px"><div class="icon">💰</div><p>Streak bonus earned!</p><small>Keep going — everything still pays. Balance: ${fmt(bal)}</small></div>`:''}

  const msgHTML    = ST.msg?`<div class="msg-bar" style="background:${ST.msg.ok?'#238636':'#da3633'}">${ST.msg.text}</div>`:'';
  const spendEntry = ST.spendEntry||'';
  const spendCents = spendEntry ? Math.round(parseFloat(spendEntry)*100) : 0;
  const spendHTML  = `
    <div class="spend-balance-big">${fmt(bal)}</div>
    <div class="spend-balance-label">available to spend</div>

  `;



  // ── HISTORY HTML ──
  const stats = data?.choreStats || {};
  const statEntries = Object.entries(stats);
  const sortKey = ST.historySort || 'never';
  const sorted = [...statEntries].sort((a,b) => {
    const [,as] = a; const [,bs] = b;
    if(sortKey==='never')     return (as.timesCompleted||0) - (bs.timesCompleted||0);
    if(sortKey==='completed') return (bs.timesCompleted||0) - (as.timesCompleted||0);
    if(sortKey==='shown')     return (bs.timesShown||0) - (as.timesShown||0);
    if(sortKey==='swapped')   return (bs.timesSwapped||0) - (as.timesSwapped||0);
    return 0;
  });
  const historyHTML = statEntries.length === 0
    ? `<div class="history-zero">No history yet. Complete some chores first.</div>`
    : `
    <div class="history-sort">
      ${[['never','Least done'],['completed','Most done'],['shown','Most shown'],['swapped','Most skipped']].map(([k,l])=>
        `<button class="sort-btn ${sortKey===k?'on':''}" onclick="ST.historySort='${k}';render()">${l}</button>`
      ).join('')}
    </div>
    <table class="history-table">
      <thead><tr>
        <th>Chore</th>
        <th class="num">Shown</th>
        <th class="num">Done</th>

      <tbody>
        ${sorted.map(([title, s])=>{
          const ratio = s.timesShown > 0 ? s.timesCompleted/s.timesShown : 0;
          const doneClass = ratio >= 0.6 ? 'hi' : ratio <= 0.2 ? 'lo' : '';
          const lastDone = s.lastCompleted
            ? (s.lastCompleted === todayStr() ? 'today' : s.lastCompleted)
            : '—';
          return `<tr>
            <td>${title}</td>
            <td class="num">${s.timesShown||0}</td>
            <td class="num ${doneClass}">${s.timesCompleted||0}</td>
            <td class="num">${s.timesSwapped||0}</td>
            <td style="font-size:11px;color:#8b949e">${lastDone}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  // ── DECLUTTER QUIZ ──
  const QUIZ = [
    {q:"Have I used it in the last year?",                               keep:"Yes",        discard:"No"},
    {q:"Does it make my daily life easier or better?",                   keep:"Yes",        discard:"No"},
    {q:"How much effort does it demand?",                                keep:"Very little",discard:"Quite a bit"},
    {q:"Could I replace it quickly and cheaply?",                        keep:"No",         discard:"Yes"},
    {q:"Would I choose to buy it today?",                                keep:"Yes",        discard:"No"},
    {q:"Is it actually doing the job it's meant to do?",                 keep:"Yes",        discard:"No"},
    {q:"Does it reflect who I am now?",                                  keep:"Yes",        discard:"No — past me"},
    {q:"Do I already own something that does the same thing?",           keep:"No",         discard:"Yes"},
    {q:"Does it have a logical, accessible home in my space?",           keep:"Yes",        discard:"No"},
    {q:"Would someone else get more value from it?",                     keep:"No",         discard:"Yes"},
    {q:"Would I bother fixing it if it broke?",                          keep:"Yes",        discard:"No"},

    {q:"Does it carry guilt, obligation, or 'someday' energy?",          keep:"No",         discard:"Yes"},

  `;

  // ── IMPULSE QUIZ ──
  const IMPULSE_Q = [
    {q:"Have I wanted this for at least two weeks, unprompted?",         buy:"Yes",              nobuy:"No",            w:2},
    {q:"Does it solve a real problem, or just an imagined one?",         buy:"Real problem",     nobuy:"Imagined one",  w:2},
    {q:"Do I already own something that does the job?",                  buy:"No",               nobuy:"Yes",           w:2},
    {q:"Can I borrow or rent it instead?",                               buy:"No",               nobuy:"Yes",           w:1},
    {q:"Do I know exactly where it will live?",                          buy:"Yes",              nobuy:"No",            w:1},
    {q:"Will I realistically still be using it in two years?",           buy:"Yes",              nobuy:"No",            w:2},
    {q:"How many hours of work does it cost me?",                        buy:"A few",            nobuy:"Too many",      w:2},
    {q:"Does the cost-per-use actually make sense?",                     buy:"Yes",              nobuy:"No",            w:2},
    {q:"Does it fit my current lifestyle?",                              buy:"Yes",              nobuy:"No",            w:2},
    {q:"Is this purchase moving me toward a financial goal or away?",    buy:"Toward",           nobuy:"Away",          w:3},

  const iq = ST.impulse;
  const iAnswered = iq.answers.length;
  const iBuyScore   = iq.answers.reduce((s,a,i)=>s+(a==='buy'?IMPULSE_Q[i].w:0),0);

  const iVerdict    = iAnswered === IMPULSE_Q.length ? (iNobuyScore > iBuyScore ? 'nobuy' : 'buy') : null;

  const impulseHTML = `
    <p class="quiz-prompt">Think of a specific thing you want to buy. Answer every question.</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">

        return `<div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:13px 14px">
          <div style="font-size:13px;color:#e6edf3;margin-bottom:10px;line-height:1.4">${q.q}</div>

            <button onclick="setImpulse(${i},'buy')" style="flex:1;padding:8px 6px;border-radius:6px;border:1px solid ${ans==='buy'?'#3fb950':'#30363d'};background:${ans==='buy'?'rgba(63,185,80,0.12)':'transparent'};color:${ans==='buy'?'#3fb950':'#8b949e'};font-size:12px;cursor:pointer;font-weight:${ans==='buy'?'600':'400'}">${q.buy}</button>
            <button onclick="setImpulse(${i},'nobuy')" style="flex:1;padding:8px 6px;border-radius:6px;border:1px solid ${ans==='nobuy'?'#f85149':'#30363d'};background:${ans==='nobuy'?'rgba(248,81,73,0.12)':'transparent'};color:${ans==='nobuy'?'#f85149':'#8b949e'};font-size:12px;cursor:pointer;font-weight:${ans==='nobuy'?'600':'400'}">${q.nobuy}</button>

    </div>
    ${iAnswered === IMPULSE_Q.length ? `
      <div class="quiz-result" style="border:1px solid #21262d;border-radius:12px;padding:24px">
        <div class="icon">${iVerdict==='nobuy'?'🚫':'✅'}</div>

        <div class="reason">${iVerdict==='nobuy'?(iStrong>=6?"This is not it. Close the tab.":"More signs point to skipping it than buying it."):(iStrong>=6?"You've thought it through. Go ahead.":"Leaning toward yes — but sleep on it one more night.")}</div>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;font-size:13px;color:#8b949e">
          <span style="color:#3fb950">${iBuyCount} buy</span><span>·</span><span style="color:#f85149">${iNobuyCount} skip</span>
        </div>
        <button class="quiz-btn" style="max-width:200px;margin:0 auto;display:block" onclick="ST.impulse={qIdx:0,answers:[],done:false};render()">Try another item</button>
      </div>` : `<div style="text-align:center;font-size:12px;color:#8b949e">${iAnswered} of ${IMPULSE_Q.length} answered${iAnswered>0?' — keep going':''}</div>`}
  `;

  // ── TIMER HTML ──
  const tm = ST.timer;
  const totalSecs = tm.phase==='work' ? 25*60 : tm.phase==='break' ? 5*60 : 20*60;
  const pct = tm.secondsLeft / totalSecs;
  const circ = 2 * Math.PI * 100; // r=100
  const offset = circ * (1 - pct);
  const mins = String(Math.floor(tm.secondsLeft/60)).padStart(2,'0');
  const secs = String(tm.secondsLeft%60).padStart(2,'0');
  const modeLabel = tm.phase==='work' ? 'Focus' : tm.phase==='break' ? 'Short Break' : 'Long Break';
  const modeClass = tm.phase==='work' ? 'work' : tm.phase==='break' ? 'brk' : 'long';
  const timerHTML = `
    <div class="timer-wrap">
      <div class="timer-mode ${modeClass}">${modeLabel}</div>
      <div class="timer-ring">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle class="timer-ring-bg" cx="110" cy="110" r="100"/>
          <circle class="timer-ring-fill ${modeClass}" cx="110" cy="110" r="100"
            stroke-dasharray="${circ.toFixed(1)}"
            stroke-dashoffset="${offset.toFixed(1)}"/>
        </svg>
        <div class="timer-digits">
          <div class="timer-time">${mins}:${secs}</div>
          <div class="timer-round">Round ${tm.round} of 4</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn primary ${tm.running?'pause':''}" onclick="timerToggle()">
          ${tm.running ? 'Pause' : tm.secondsLeft===totalSecs ? 'Start' : 'Resume'}
        </button>
        <button class="timer-btn secondary" onclick="timerReset()">Reset</button>
      </div>
      <div class="timer-dots">
        ${[1,2,3,4].map(i=>`<div class="timer-dot ${i<tm.round||(i===tm.round&&tm.phase!=='work')?'done':''}"></div>`).join('')}
      </div>
    </div>
  `;
  app.innerHTML = `
    <div class="wallet-bar">
      <div><div class="wallet-amount">${fmt(bal)}</div><div class="wallet-label">balance</div></div>
      <div class="wallet-right">
        <div class="streak-badge">🔥 ${data?.streak||0} day streak</div>
        <div class="total-earned">${fmt(data?.totalEarned||0)} earned total</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab ${tab==='chores'?'on':''}" onclick="setTab('chores')">Chores</button>
      <button class="tab ${tab==='spend'?'on':''}" onclick="setTab('spend')">Spend</button>
      <button class="tab ${tab==='extras'?'on':''}" onclick="setTab('extras')">Other Tools</button>
      <button class="home-btn" onclick="ST.screen='home';render()">↺</button>
      <button class="home-btn" onclick="ST.editSettings=JSON.parse(JSON.stringify(ST.settings));ST.screen='settings';render()">⚙</button>
    </div>
    <div class="body">${tab==='chores'?choreHTML:tab==='spend'?spendHTML:
      ST.extrasSection==='timer' ? `
        <button onclick="ST.extrasSection=null;render()" style="background:transparent;border:none;color:#8b949e;font-size:13px;cursor:pointer;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px">← Back</button>
        ${timerHTML}
      ` :
      ST.extrasSection==='impulse' ? `
        <button onclick="ST.extrasSection=null;render()" style="background:transparent;border:none;color:#8b949e;font-size:13px;cursor:pointer;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px">← Back</button>
        ${impulseHTML}
      ` :
      ST.extrasSection==='declutter' ? `
        <button onclick="ST.extrasSection=null;render()" style="background:transparent;border:none;color:#8b949e;font-size:13px;cursor:pointer;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px">← Back</button>
        ${declutterHTML}
      ` : `
        <div style="display:flex;flex-direction:column;gap:12px;padding-top:8px">
          <button onclick="ST.extrasSection='timer';render()" style="display:flex;align-items:center;gap:16px;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;cursor:pointer;text-align:left;color:#e6edf3;width:100%">
            <span style="font-size:28px">⏱</span>
            <div>
              <div style="font-size:15px;font-weight:600;margin-bottom:3px">Pomodoro Timer</div>
              <div style="font-size:12px;color:#8b949e">25 min focus, 5 min break</div>
            </div>
            <span style="margin-left:auto;color:#8b949e;font-size:18px">›</span>
          </button>
          <button onclick="ST.extrasSection='declutter';render()" style="display:flex;align-items:center;gap:16px;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;cursor:pointer;text-align:left;color:#e6edf3;width:100%">
            <span style="font-size:28px">🗂</span>
            <div>
              <div style="font-size:15px;font-weight:600;margin-bottom:3px">Declutter Quiz</div>
              <div style="font-size:12px;color:#8b949e">Should you keep it or let it go?</div>
            </div>
            <span style="margin-left:auto;color:#8b949e;font-size:18px">›</span>
          </button>
          <button onclick="ST.extrasSection='impulse';render()" style="display:flex;align-items:center;gap:16px;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;cursor:pointer;text-align:left;color:#e6edf3;width:100%">
            <span style="font-size:28px">💳</span>
            <div>
              <div style="font-size:15px;font-weight:600;margin-bottom:3px">Impulse Buy Quiz</div>
              <div style="font-size:12px;color:#8b949e">Should you actually buy it?</div>
            </div>
            <span style="margin-left:auto;color:#8b949e;font-size:18px">›</span>
          </button>
        </div>
      `
    }</div>
  `;

  // Render floating menu outside card stack
  const existingOverlay = document.getElementById('task-menu-portal');
  if(existingOverlay) existingOverlay.remove();
  if(ST.activeMenu) {
    const task = getAllTasks().find(t=>t.id===ST.activeMenu);
    if(task) {
      const swapKey = task.bonus?'bonus':(task.group==='room'?`room:${task.room}`:'general');
      const swapped = ST.daily?.swapped || {};
      const canSwap = !swapped[swapKey];
      const snoozed = (ST.daily?.snoozed||{})[task.id];
      const skipped = (ST.daily?.skippedIds||[]).includes(task.id);
      const portal = document.createElement('div');
      portal.id = 'task-menu-portal';
      portal.innerHTML = `
        <div class="task-menu-overlay" onclick="closeMenu()"></div>
        <div class="task-menu" id="floating-menu">
          <div class="task-menu-header">${task.title}</div>
          ${canSwap?`<button class="task-menu-item" onclick="swapTask('${task.id}','${swapKey}');closeMenu()">↺ Swap for something else</button>`:''}
          ${!skipped
            ? `<button class="task-menu-item" onclick="skipTask('${task.id}')">Skip<div class="menu-sub">Shows up again tomorrow</div></button>`
            : `<button class="task-menu-item" onclick="unskipTask('${task.id}')">↩ Undo skip</button>`}
          ${!snoozed
            ? `<div style="font-size:12px;color:#8b949e;padding:8px 14px 2px;border-bottom:1px solid #21262d">Snooze until...</div>
               <div class="snooze-opts">
                 <button class="snooze-opt" onclick="snoozeTask('${task.id}',1)">Tomorrow</button>
                 <button class="snooze-opt" onclick="snoozeTask('${task.id}',7)">1 week</button>
                 <button class="snooze-opt" onclick="snoozeTask('${task.id}',30)">1 month</button>
               </div>`
            : `<button class="task-menu-item" onclick="unsnoozeTask('${task.id}')">↩ Undo snooze</button>`}
          <button class="task-menu-item" style="color:#f85149" onclick="hideTask('${task.id}','${task.title}')">
            Hide forever
            <div class="menu-sub" style="color:#8b949e">Won't appear again</div>
          </button>
          <button class="task-menu-item" style="color:#6e7681;font-size:13px" onclick="closeMenu()">Cancel</button>

          const menuH = menu.offsetHeight;
          const spaceBelow = window.innerHeight - rect.bottom;
          const top = spaceBelow > menuH + 10 ? rect.bottom + 6 : rect.top - menuH - 6;
          menu.style.top = top + 'px';
          menu.style.right = '16px';
          menu.style.left = 'auto';
        }
      }, 0);
    }
  }
}

function renderCard(t, completed, locked=false, isRoom=false, isBonus=false) {
  const done      = !!completed[t.id];
  const snoozed   = (ST.daily?.snoozed||{})[t.id];
  const skipped   = (ST.daily?.skippedIds||[]).includes(t.id);
  const valClass  = isBonus?'gold':isRoom?'blue':'';
  const swapKey   = isBonus?'bonus':(isRoom?`room:${t.room}`:'general');
  const swapped   = ST.daily?.swapped || {};
  const canSwap   = !done && !locked && !swapped[swapKey];
  const menuOpen  = ST.activeMenu === t.id;
  const inactive  = done || locked || snoozed || skipped;

  return `
    <div class="card-wrap" style="position:relative">
      <div style="display:flex;align-items:stretch;gap:0">
        <button class="card ${done?'done-card':locked?'locked':snoozed||skipped?'snoozed':''}"
          style="flex:1;border-radius:10px"
          ${inactive?'disabled':''} onclick="complete('${t.id}')">
          <span class="card-emoji">${t.emoji}</span>
          <div class="card-mid">
            <div class="card-title ${done||snoozed||skipped?'done':''}">${t.title}${isBonus?'<span class="bonus-tag">BONUS</span>':''}</div>
            <div class="card-desc">${snoozed?`<span style="color:#e3b341">Snoozed until ${snoozed}</span>`:skipped?'<span style="color:#8b949e">Skipped — back tomorrow</span>':t.desc}</div>
          </div>
          ${done?'<span class="card-check">✓</span>':inactive?'':
            `<span class="card-val ${valClass}">${fmt(t.val)}</span>`}
        </button>
        ${!done?`<button class="card-menu-btn" onclick="toggleMenu('${t.id}',event)" style="background:#161b22;border:1px solid #21262d;border-left:none;border-radius:0 10px 10px 0;padding:0 12px">···</button>`:''}
      </div>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

function setDeclutter(i, ans) {
  const answers = [...(ST.declutter.answers||[])];
  while(answers.length <= i) answers.push(null);
  answers[i] = ans;
  ST.declutter.answers = answers;
  render();
}

function setImpulse(i, ans) {
  const answers = [...(ST.impulse.answers||[])];
  while(answers.length <= i) answers.push(null);
  answers[i] = ans;
  ST.impulse.answers = answers;
  render();
}

function answerImpulse(ans) {
  const IMPULSE_LEN = 13;
  ST.impulse.answers.push(ans);
  ST.impulse.qIdx++;
  if(ST.impulse.qIdx >= IMPULSE_LEN) ST.impulse.done = true;
  render();
}

function answerQuiz(ans) {
  const QUIZ_LEN = 18;
  ST.declutter.answers.push(ans);
  ST.declutter.qIdx++;
  if(ST.declutter.qIdx >= QUIZ_LEN) ST.declutter.done = true;
  render();
}

function toggleMenu(id, e) {
  e.stopPropagation();
  ST.activeMenu = ST.activeMenu === id ? null : id;
  render();
  // Position menu below the button after render
  if(ST.activeMenu) {
    setTimeout(()=>{
      const btn = e.target;
      const menu = document.getElementById('menu-'+id);
      if(menu && btn) {
        const rect = btn.getBoundingClientRect();
        menu.style.top = (rect.bottom + 6) + 'px';
        menu.style.right = '16px';
      }
    }, 0);
  }
}

function hideTask(id, title) {
  ST.data.hiddenTasks = ST.data.hiddenTasks || [];
  if(title && !ST.data.hiddenTasks.includes(title)) {
    ST.data.hiddenTasks.push(title);
    saveData(ST.data);
  }
  ST.activeMenu = null;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

// ── BACKUP / RESTORE ──────────────────────────────────────────────────────────
// Epoch: days since 2024-01-01
const EPOCH = new Date('2024-01-01').getTime();
const dateToN = d => d ? Math.round((new Date(d) - EPOCH) / 86400000).toString(36) : '';
const nToDate = n => { const d = new Date(EPOCH + parseInt(n,36)*86400000); return d.toISOString().split('T')[0]; };

function generateBackup() {
  const d = ST.data;
  if(!d) return;
  // Header: CT3|balance|totalEarned|totalCompleted|streak|maxStreak|lastActiveDay
  const header = [
    'CT3',
    (d.balance||0).toString(36),
    (d.totalEarned||0).toString(36),
    (d.totalCompleted||0).toString(36),
    (d.streak||0).toString(36),
    (d.maxStreak||0).toString(36),
    dateToN(d.lastActiveDay),
  ].join('|');

  const titleCode = t => {
    const consonants = t.toUpperCase().replace(/[AEIOU\s\W]/g,'');
    return (consonants.slice(0,3) + t.replace(/\s/g,'').length).slice(0,6);
  };
  const history = Object.entries(d.choreHistory||{})
    .filter(([,date]) => date)
    .map(([title, date]) => `${titleCode(title)}:${dateToN(date)}`)
    .join(',');

  // Settings as base64
  const settingsB64 = btoa(JSON.stringify(ST.settings||{}));

  const code = `${header}~${history}~${settingsB64}`;
  const box = document.getElementById('backup-box');
  if(box) { box.value = code; box.select(); }
  try { navigator.clipboard.writeText(code); showMsg('Copied to clipboard', true); }
  catch(e) { showMsg('Code shown below — copy it manually', true); }
}

function importBackup() {
  const box = document.getElementById('backup-box');
  const code = box?.value?.trim();
  if(!code || !code.startsWith('CT')) { showMsg('Invalid backup code', false); return; }

  try {
    const parts = code.split('~');
    const [header, historyPart, settingsPart] = parts;
    const [,bal,earned,completed,streak,maxStreak,lastDay] = header.split('|');

    const d = loadData() || defaultData();
    d.balance       = parseInt(bal, 36);
    d.totalEarned   = parseInt(earned, 36);
    d.totalCompleted= parseInt(completed, 36);
    d.streak        = parseInt(streak, 36);
    d.maxStreak     = parseInt(maxStreak, 36);
    d.lastActiveDay = lastDay ? nToDate(lastDay) : null;

    if(historyPart) {
      const allTitles = getAllKnownTitles();
      const titleCode = t => {
        const consonants = t.toUpperCase().replace(/[AEIOU\s\W]/g,'');
        return (consonants.slice(0,3) + t.replace(/\s/g,'').length).slice(0,6);
      };
      const codeMap = {};
      allTitles.forEach(t => { codeMap[titleCode(t)] = t; });
      historyPart.split(',').forEach(entry => {
        const [code, dayN] = entry.split(':');
        const title = codeMap[code];
        if(title && dayN) d.choreHistory[title] = nToDate(dayN);
      });
    }

    saveData(d);
    ST.data = d;

    // Restore settings if present
    if(settingsPart) {
      try {
        const s = JSON.parse(atob(settingsPart));
        saveSettings(s);
        ST.settings = s;
      } catch(e) {}
    }

    showMsg('Backup restored!', true);
    render();
  } catch(e) {
    showMsg('Could not read backup code', false);
  }
}

function getAllKnownTitles() {
  // Pull every possible task title from all pools
  const titles = new Set();
  const settings = ST.settings || DEFAULT_SETTINGS;
  const n = settings.bathrooms || 1;
  const nb = settings.bedrooms || 1;
  GENERAL_POOL.forEach(fn => titles.add(fn().title));
  KITCHEN_POOL.forEach(fn => titles.add(fn().title));
  OFFICE_POOL.forEach(fn => titles.add(fn().title));
  GAMEROOM_POOL.forEach(fn => titles.add(fn().title));
  DEN_POOL.forEach(fn => titles.add(fn().title));
  BASEMENT_POOL.forEach(fn => titles.add(fn().title));
  LAUNDRY_POOL.forEach(fn => titles.add(fn().title));
  const fb2=settings.fullBaths||1, hb2=settings.halfBaths||0;
  for(let i=1;i<=fb2;i++){ const nm=(fb2+hb2)===1?'Full Bath':`Full Bath #${i}`; FULL_BATH_POOL(nm).forEach(t=>titles.add(t.title)); }
  for(let i=1;i<=hb2;i++){ const nm=(fb2+hb2)===1?'Half Bath':`Half Bath #${i}`; HALF_BATH_POOL(nm).forEach(t=>titles.add(t.title)); }
  for(let i=1;i<=nb;i++) { const nm=nb===1?'Bedroom':`Bedroom #${i}`; BEDROOM_POOL.forEach(fn=>titles.add(fn(nm).title)); }
  for(let i=1;i<=4;i++) { const nm=i===1?'Stairs':`Stairs #${i}`; STAIRS_POOL.forEach(fn=>titles.add(fn(nm).title)); }
  return [...titles];
}

function resetAll() {
  if(!confirm("Reset everything? This clears your balance, streak, history, and all settings. Cannot be undone.")) return;
  localStorage.removeItem("cm4d");
  localStorage.removeItem("cm4t");
  localStorage.removeItem("cm4s");
  location.reload();
}

function unhideTask(title) {
  ST.data.hiddenTasks = (ST.data.hiddenTasks||[]).filter(t=>t!==title);
  saveData(ST.data);
  render();
}

function closeMenu() {
  ST.activeMenu = null;
  render();
}

function skipTask(id) {
  if(!ST.daily.skippedIds) ST.daily.skippedIds = [];
  ST.daily.skippedIds.push(id);
  // Record for history
  const task = getAllTasks().find(t=>t.id===id);
  if(task) {
    const cs = {...(ST.data.choreStats||{})};
    cs[task.title] = cs[task.title] || {timesShown:0,timesCompleted:0,timesSwapped:0,lastCompleted:null};
    cs[task.title].timesSwapped = (cs[task.title].timesSwapped||0) + 1;
    ST.data.choreStats = cs;
    saveData(ST.data);
  }
  ST.activeMenu = null;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

function unskipTask(id) {
  ST.daily.skippedIds = (ST.daily.skippedIds||[]).filter(x=>x!==id);
  ST.activeMenu = null;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

function snoozeTask(id, days) {
  const until = new Date();
  until.setDate(until.getDate() + days);
  const untilStr = until.toISOString().split('T')[0];
  if(!ST.daily.snoozed) ST.daily.snoozed = {};
  ST.daily.snoozed[id] = untilStr;
  // Persist snooze across days in data
  ST.data.snoozed = ST.data.snoozed || {};
  const task = getAllTasks().find(t=>t.id===id);
  if(task) { ST.data.snoozed[task.title] = untilStr; saveData(ST.data); }
  ST.activeMenu = null;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

function unsnoozeTask(id) {
  if(ST.daily.snoozed) delete ST.daily.snoozed[id];
  const task = getAllTasks().find(t=>t.id===id);
  if(task && ST.data.snoozed) { delete ST.data.snoozed[task.title]; saveData(ST.data); }
  ST.activeMenu = null;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

function setTab(t) { ST.tab=t; if(t!=='extras') ST.extrasSection=null; render(); }

function saveSettingsAndBack() {
  ST.settings = ST.editSettings;
  saveSettings(ST.settings);
  ST.screen = "home";
  render();
}

function startDay() {
  const daily = buildDailyTasks(ST.settings);
  ST.daily     = daily;
  ST.completed = {};
  ST.screen    = "quest";
  ST.tab       = "chores";
  saveToday({date:todayStr(), daily, completed:{}});
  // Record all shown tasks
  const allShown = [...(daily.general||[]), ...Object.values(daily.rooms||{}).flat()];
  recordShown(allShown);
  render();
}

function getAllTasks() {
  if(!ST.daily) return [];
  return [
    ...(ST.daily.general||[]),
    ...Object.values(ST.daily.rooms||{}).flat(),
    ...(ST.daily.bonus||[]),
  ];
}

function complete(id) {
  const task = getAllTasks().find(t=>t.id===id);
  if(!task||ST.completed[id]) return;
  ST.completed[id] = true;

  showBurst(`+${fmt(task.val)}`);

  let d = {...ST.data};
  d.balance       = (d.balance||0)+task.val;
  d.totalEarned   = (d.totalEarned||0)+task.val;
  d.totalCompleted= (d.totalCompleted||0)+1;
  d.choreHistory  = {...(d.choreHistory||{}), [task.title]: todayStr()};
  const cs = {...(d.choreStats||{})};
  cs[task.title] = cs[task.title] || {timesShown:0,timesCompleted:0,timesSwapped:0,lastCompleted:null};
  cs[task.title].timesCompleted++;
  cs[task.title].lastCompleted = todayStr();
  d.choreStats = cs;

  const today=todayStr(), last=d.lastActiveDay;
  if(last!==today) {
    if(!last){d.streak=1;d.maxStreak=1;}
    else{ const g=daysBetween(last,today); if(g===1){d.streak++;d.maxStreak=Math.max(d.streak,d.maxStreak);}else{d.streak=1;} }
    d.lastActiveDay=today;
  }

  ST.data=d; saveData(d);
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});

  // All-maxed bonus
  const roomOrder    = getRoomOrder(ST.settings);
  const genDone      = (ST.daily.general||[]).filter(t=>ST.completed[t.id]).length;
  let   roomDone     = 0;
  for(const r of roomOrder) roomDone += (ST.daily.rooms[r]||[]).filter(t=>ST.completed[t.id]).length;

  if(genDone>=GENERAL_MAX && roomDone>=ROOM_MAX && d.allDoneBonusPaidToday!==today) {
    const total  = [...(ST.daily.general||[]),...Object.values(ST.daily.rooms||{}).flat()].reduce((s,t)=>s+t.val,0);
    const bonus  = Math.round(total*0.2);
    d.balance   += bonus;
    d.totalEarned+=bonus;
    d.allDoneBonusPaidToday=today;
    ST.data=d; saveData(d);
    setTimeout(()=>showBurst(`+${fmt(bonus)} streak bonus!`),700);
  }
  render();
}

function swapTask(id, key) {
  const usedTitles = getAllTasks().map(t=>t.title);

  if(key==='general') {
    const pool = GENERAL_POOL.filter(fn=>!usedTitles.includes(fn().title));
    if(!pool.length) return;
    const nt = {...pick(pool)(), group:"general", id:`t${Date.now()}_s`};
    ST.daily.general = ST.daily.general.map(t=>t.id===id?nt:t);

  } else if(key.startsWith('room:')) {
    const room = key.slice(5);
    let pool;
    if(room==='Kitchen')    pool = KITCHEN_POOL.map(fn=>()=>fn());
    else if(room==='Bathrooms') {
      const fb = ST.settings.fullBaths||1;
      const hb = ST.settings.halfBaths||0;
      pool = [];
      for(let i=1;i<=fb;i++){ const nm=(fb+hb)===1?'Full Bath':`Full Bath #${i}`; FULL_BATH_POOL(nm).forEach(t=>pool.push(()=>t)); }
      for(let i=1;i<=hb;i++){ const nm=(fb+hb)===1?'Half Bath':`Half Bath #${i}`; HALF_BATH_POOL(nm).forEach(t=>pool.push(()=>t)); }
    } else if(room==='Bedrooms') {
      const n = ST.settings.bedrooms;
      pool = [];
      for(let i=1;i<=n;i++){
        const nm = n===1?'Bedroom':`Bedroom #${i}`;
        BEDROOM_POOL.forEach(fn=>pool.push(()=>fn(nm)));
      }
    } else pool = OFFICE_POOL.map(fn=>()=>fn());

    const candidates = pool.filter(fn=>!usedTitles.includes(fn().title));
    if(!candidates.length) return;
    const nt = {...pick(candidates)(), group:"room", room, id:`t${Date.now()}_s`};
    ST.daily.rooms[room] = ST.daily.rooms[room].map(t=>t.id===id?nt:t);

  } else if(key==='bonus') {
    const all = [...GENERAL_POOL,...KITCHEN_POOL,...OFFICE_POOL,
      ...Array.from({length:ST.settings.fullBaths||1},(_,i)=>{ const nm=(ST.settings.fullBaths||1)===1?'Full Bath':`Full Bath #${i+1}`; return FULL_BATH_POOL(nm).map(t=>()=>t); }).flat(),
    ...Array.from({length:ST.settings.halfBaths||0},(_,i)=>{ const nm=(ST.settings.halfBaths||0)===1?'Half Bath':`Half Bath #${i+1}`; return HALF_BATH_POOL(nm).map(t=>()=>t); }).flat(),
      ...Array.from({length:ST.settings.bedrooms},(_,i)=>{
        const nm=ST.settings.bedrooms===1?'Bedroom':`Bedroom #${i+1}`;
        return BEDROOM_POOL.map(fn=>()=>fn(nm));
      }).flat(),
    ];
    const candidates = all.filter(fn=>!usedTitles.includes(fn().title));
    if(!candidates.length) return;
    const base = pick(candidates)();
    const nt   = {...base, val:base.val+Math.round(base.val*0.25), bonus:true, group:"bonus", id:`t${Date.now()}_s`};
    ST.daily.bonus = (ST.daily.bonus||[]).map(t=>t.id===id?nt:t);
  }

  if(!ST.daily.swapped) ST.daily.swapped = {};
  ST.daily.swapped[key] = true;

  // Record timesSwapped for the original task
  const swappedTask = getAllTasks().find(t=>t.id===id) || {title:id};
  const cs2 = {...(ST.data.choreStats||{})};
  if(swappedTask.title) {
    cs2[swappedTask.title] = cs2[swappedTask.title] || {timesShown:0,timesCompleted:0,timesSwapped:0,lastCompleted:null};
    cs2[swappedTask.title].timesSwapped++;
    ST.data.choreStats = cs2;
    saveData(ST.data);
  }

  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

// Titles of tasks that contain randomized numbers or colors — excluded from bonus picker
const SLOTTED_TITLES = new Set([
  "Wrong Room","Color Hunt","Floor Pickup","Purge","Flat Surfaces","Windows",
  "Duplicates","Tech Wipe","Plants","Mystery Cables","Expired Stuff","Book Donate",
  "Kitchen Gadget Donate","Fridge Purge","Appliances","Cabinets","Cables","Shelves",
  "Cable Management","Game Cull","Bookshelf","Trash Run","Void Box Audit","Donate Pile",
  "Orphan Socks","Couch Cushions",
]);
// Room-prefixed slotted tasks (matched by suffix)
const SLOTTED_SUFFIXES = [
  "— Clothes","— Under Bed","— Socks","— Shelves","— Clothing Donate",
];
function isSlotted(title) {
  if(SLOTTED_TITLES.has(title)) return true;
  return SLOTTED_SUFFIXES.some(s => title.includes(s));
}

function getAllBonusPool() {
  const s = ST.settings || DEFAULT_SETTINGS;
  const nb = s.bathrooms||1, nbd = s.bedrooms||1, ns = s.stairs||1;
  return [
    ...GENERAL_POOL, ...KITCHEN_POOL, ...OFFICE_POOL,
    ...GAMEROOM_POOL, ...DEN_POOL, ...BASEMENT_POOL, ...LAUNDRY_POOL,
    ...Array.from({length:nb},(_,i)=>{ const nm=nb===1?'Bathroom':`Bathroom #${i+1}`; return BATHROOM_POOL.map(fn=>()=>fn(nm)); }).flat(),
    ...Array.from({length:nbd},(_,i)=>{ const nm=nbd===1?'Bedroom':`Bedroom #${i+1}`; return BEDROOM_POOL.map(fn=>()=>fn(nm)); }).flat(),
    ...Array.from({length:ns},(_,i)=>{ const nm=ns===1?'Stairs':`Stairs #${i+1}`; return STAIRS_POOL.map(fn=>()=>fn(nm)); }).flat(),
  ];
}

function addBonusTaskPicked(title) {
  const all = getAllBonusPool();
  const usedTitles = getAllTasks().map(t=>t.title);
  const fn = all.find(f=>f().title===title);
  if(!fn) return;
  const base = fn();
  const {val} = scaledVal(base.val, base.title);
  const task = {...base, baseVal:base.val, val:Math.round(val*1.25), bonus:true, group:"bonus", id:`t${Date.now()}_b`};
  if(!ST.daily.bonus) ST.daily.bonus=[];
  ST.daily.bonus.push(task);
  ST.showBonusPicker = false;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

function addBonusTask() {
  const usedTitles = getAllTasks().map(t=>t.title);
  const hidden = ST.data?.hiddenTasks||[];
  const all = getAllBonusPool();
  const candidates = all.filter(fn=>{ const t=fn(); return !usedTitles.includes(t.title)&&!hidden.includes(t.title)&&!isSlotted(t.title); });
  if(!candidates.length) return;
  const base = pick(candidates)();
  const {val} = scaledVal(base.val, base.title);
  const task = {...base, baseVal:base.val, val:Math.round(val*1.25), bonus:true, group:"bonus", id:`t${Date.now()}_b`};
  if(!ST.daily.bonus) ST.daily.bonus=[];
  ST.daily.bonus.push(task);
  ST.showBonusPicker = false;
  saveToday({date:todayStr(),daily:ST.daily,completed:ST.completed});
  render();
}

function keypad(k) {
  let v = ST.spendEntry || '';
  if(k === '⌫') { v = v.slice(0,-1); }
  else if(k === '.') { if(!v.includes('.')) v += '.'; }
  else {
    // max 2 decimal places
    const parts = v.split('.');
    if(parts[1] !== undefined && parts[1].length >= 2) return;
    v += k;
  }
  ST.spendEntry = v;
  render();
}

function confirmSpend() {
  const cents = Math.round(parseFloat(ST.spendEntry)*100);
  if(!cents || cents <= 0 || cents > (ST.data.balance||0)) return;
  ST.data = {...ST.data, balance: ST.data.balance - cents};
  saveData(ST.data);
  ST.spendEntry = '';
  showMsg(`Spent ${fmt(cents)}`, true);
  render();
}


function timerToggle() {
  const tm = ST.timer;
  if(tm.running) {
    clearInterval(tm.intervalId);
    tm.running = false;
    tm.intervalId = null;
  } else {
    tm.running = true;
    tm.intervalId = setInterval(() => {
      ST.timer.secondsLeft--;
      if(ST.timer.secondsLeft <= 0) timerAdvance();
      else if(ST.tab === 'timer') render();
    }, 1000);
  }
  render();
}

function timerAdvance() {
  clearInterval(ST.timer.intervalId);
  ST.timer.running = false;
  ST.timer.intervalId = null;
  const tm = ST.timer;
  if(tm.phase === 'work') {
    if(tm.round >= 4) { tm.phase = 'long'; tm.secondsLeft = 20*60; }
    else              { tm.phase = 'break'; tm.secondsLeft = 5*60; }
  } else {
    if(tm.phase === 'long') tm.round = 1; else tm.round++;
    tm.phase = 'work'; tm.secondsLeft = 25*60;
  }
  // Vibrate if supported
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
  render();
}

function timerReset() {
  clearInterval(ST.timer.intervalId);
  ST.timer = { phase:'work', secondsLeft:25*60, running:false, round:1, intervalId:null };
  render();
}

function showBurst(text) {
  const b=document.getElementById("burst");
  b.textContent=text; b.style.display="block"; b.style.animation="none";
  b.offsetHeight; b.style.animation="burstUp 1.4s forwards";
  setTimeout(()=>b.style.display="none",1400);
}

function showMsg(text,ok) {
  ST.msg={text,ok}; render();
  setTimeout(()=>{ST.msg=null;render();},2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function(){
  ST.data     = loadData()     || defaultData();
  ST.settings = loadSettings() || {...DEFAULT_SETTINGS};

  // Check for broken streak on load
  const d = ST.data;
  const last = d.lastActiveDay;
  if(last && daysBetween(last, todayStr()) > 1 && d.streak > 0) {
    const penalty = ST.settings?.streakPenalty || 0;
    if(penalty > 0) {
      d.balance = Math.max(0, (d.balance||0) - penalty);
      d.streak = 0;
      saveData(d);
    }
  }

  const t = loadToday();
  if(t && t.date===todayStr()) {
    ST.daily     = t.daily;
    ST.completed = t.completed||{};
    ST.screen    = "quest";
  } else {
    ST.screen = "home";
  }
  render();
})();
</script>
